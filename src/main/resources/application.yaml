spring:
  application:
    name: deepshuffle
  profiles:
    default: local
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:2}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:0}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:30000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:600000}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:10000}
      validation-timeout: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:5000}
      leak-detection-threshold: ${SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_THRESHOLD:0}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  port: ${PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}

spotify:
  client:
    id: ${SPOTIFY_CLIENT_ID:}
    secret: ${SPOTIFY_CLIENT_SECRET:}
  redirect-uri: ${SPOTIFY_CLIENT_URI:http://127.0.0.1:8080/spotify/callback}
  oauth:
    state-secret: ${SPOTIFY_OAUTH_STATE_SECRET:${SPOTIFY_CLIENT_SECRET:local-dev-state-secret}}
    state-ttl-seconds: ${SPOTIFY_OAUTH_STATE_TTL_SECONDS:600}

deepshuffle:
  deployment:
    environment-name: ${DEEPSHUFFLE_ENVIRONMENT:local}
    stage-mode: ${DEEPSHUFFLE_STAGE_MODE:false}
  discovery:
    crawler:
      enabled: ${DEEPSHUFFLE_DISCOVERY_CRAWLER_ENABLED:true}
      fixed-delay-ms: ${DEEPSHUFFLE_DISCOVERY_CRAWLER_FIXED_DELAY_MS:30000}
      initial-delay-ms: ${DEEPSHUFFLE_DISCOVERY_CRAWLER_INITIAL_DELAY_MS:10000}

logging:
  level:
    root: INFO
    org.example.deepshuffle: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} : %msg%n"
